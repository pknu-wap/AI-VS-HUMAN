name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.1' }}
      AI_REVIEW_MAX_PATCH_CHARS: "60000"

    steps:
      - name: Check OpenAI API key
        if: env.OPENAI_API_KEY == ''
        run: echo "::notice::Set the OPENAI_API_KEY repository secret to enable AI PR reviews."

      - name: Checkout repository
        if: env.OPENAI_API_KEY != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.OPENAI_API_KEY != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run AI review
        if: env.OPENAI_API_KEY != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/ai-review.mjs
